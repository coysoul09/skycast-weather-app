<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="storm-cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3A3A4A"/>
      <stop offset="100%" stop-color="#252530"/>
    </linearGradient>
    <filter id="bolt-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark cloud -->
  <path d="M52 36 H12 C7 36 3 32 3 27 C3 22.3 6.6 18.5 11.2 18.1 C11.1 17.4 11 16.7 11 16 C11 10.5 15.5 6 21 6 C25.3 6 29 8.5 30.8 12.2 C32.2 11.4 33.8 11 35.5 11 C40.8 11 45 15.2 45 20.5 C45 20.9 45 21.4 44.9 21.8 C48.3 22.6 51 25.5 51 29 L52 36Z"
        fill="url(#storm-cloud)"/>
  <!-- Rain streaks -->
  <path d="M14 42 L12 50" stroke="#7090B0" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M46 42 L44 50" stroke="#7090B0" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Lightning bolt -->
  <g filter="url(#bolt-glow)">
    <path d="M35 36 L26 50 L32 50 L24 64 L38 46 L31 46 Z"
          fill="#FFE040" stroke="#FFF080" stroke-width="0.5"/>
  </g>
</svg>
