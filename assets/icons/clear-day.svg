<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="sun-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFAA00"/>
    </radialGradient>
    <filter id="sun-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#sun-glow)">
    <!-- Rays -->
    <line x1="32" y1="4"  x2="32" y2="12" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="52" x2="32" y2="60" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4"  y1="32" x2="12" y2="32" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="32" x2="60" y2="32" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10.7" y1="10.7" x2="16.4" y2="16.4" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="47.6" y1="47.6" x2="53.3" y2="53.3" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="53.3" y1="10.7" x2="47.6" y2="16.4" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16.4" y1="47.6" x2="10.7" y2="53.3" stroke="#FFD040" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Sun body -->
    <circle cx="32" cy="32" r="12" fill="url(#sun-core)"/>
  </g>
</svg>
